<title>Ditteau · KPI Library</title>
<style>
:root {
  --navy:#13405a; --maroon:#740049; --green:#5c861d; --blue:#4285f4;
  --teal:#1a7a6e; --purple:#7b50c8; --amber:#b86e00; --steel:#5a6e7a;
  --bg:#f0f4f6; --surface:#fff; --border:#c8d4da;
  --ff-ui:Verdana,Geneva,Tahoma,sans-serif;
  --ff-mono:'Courier New',Courier,monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg);font-family:var(--ff-ui);font-size:13px;color:#1a2a32;line-height:1.4}

.page{max-width:1320px;margin:0 auto;padding:2rem 1.25rem 4rem}

/* header */
.hdr{border-bottom:3px solid var(--navy);padding-bottom:1rem;margin-bottom:1.5rem}
.hdr .eye{font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--steel);margin-bottom:.3rem}
.hdr h1{font-family:Georgia,serif;font-size:1.6rem;font-weight:normal;color:var(--navy);line-height:1.2}
.hdr .sub{font-size:.72rem;color:var(--steel);margin-top:.3rem}
.hdr .dash-link{display:inline-flex;align-items:center;gap:.35rem;margin-top:.75rem;padding:.4rem .75rem;background:var(--maroon);color:#fff;text-decoration:none;border-radius:3px;font-size:.75rem;font-weight:bold;letter-spacing:.02em;transition:all .2s}
.hdr .dash-link:hover{background:#8b0057;transform:translateY(-1px);box-shadow:0 2px 6px rgba(116,0,73,.25)}
.hdr .dash-link svg{width:14px;height:14px;fill:currentColor}
.counts{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:1rem}
.count-pill{display:inline-flex;align-items:center;gap:.4rem;padding:.25rem .65rem;border-radius:2px;font-size:.7rem;font-weight:bold;background:#e0e8ed;color:var(--navy)}
.count-pill.kpi{background:#e8f0fd;color:var(--blue)}
.count-pill.chart{background:#e6f4f2;color:var(--teal)}
.count-pill.dashboard{background:#f2ecfd;color:var(--purple)}

/* filter bar */
.filterbar{display:flex;flex-wrap:wrap;gap:.75rem;align-items:center;margin-bottom:1rem;padding:.6rem .75rem;background:var(--surface);border:1px solid var(--border)}
.filter-label{font-size:.68rem;text-transform:uppercase;letter-spacing:.08em;color:var(--steel);white-space:nowrap}
.filter-group{display:flex;flex-wrap:wrap;gap:.3rem}
.fbtn{padding:.2rem .55rem;font-size:.68rem;font-family:var(--ff-ui);border:1px solid var(--border);background:var(--bg);color:var(--steel);cursor:pointer;border-radius:2px;font-weight:bold;letter-spacing:.03em}
.fbtn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.divider{width:1px;background:var(--border);align-self:stretch}

/* search */
#search{padding:.25rem .5rem;font-size:.72rem;font-family:var(--ff-ui);border:1px solid var(--border);background:var(--bg);border-radius:2px;width:180px;color:#1a2a32}
#search:focus{outline:none;border-color:var(--navy)}

/* table */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;background:var(--surface);font-size:.75rem}
thead th{background:var(--navy);color:#fff;padding:.5rem .6rem;text-align:left;font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;white-space:nowrap;position:sticky;top:0;z-index:2}
tbody tr{border-bottom:1px solid var(--border)}
tbody tr:nth-child(even){background:#f7fafb}
tbody tr:hover{background:#eef5f8}
tbody tr.hidden{display:none}
td{padding:.45rem .6rem;vertical-align:top;line-height:1.35}

/* area badge */
.area{display:inline-block;font-size:.62rem;padding:.1rem .35rem;border-radius:2px;font-weight:bold;letter-spacing:.03em;white-space:nowrap}
.area.Admissions{background:#fdf0f6;color:var(--maroon);border:1px solid #d999bb}
.area.Registration{background:#edf4e5;color:var(--green);border:1px solid #a8c57a}
.area.Financial-Aid{background:#fffbe8;color:#8a6a00;border:1px solid #d4c060}
.area.Enrollment-Management{background:#e8f0f5;color:var(--navy);border:1px solid #9ab9cd}
.area.Cross-Domain{background:#f3f0fb;color:#5a3d9e;border:1px solid #c0aee8}

/* type badge */
.type-badge{display:inline-block;font-size:.62rem;padding:.1rem .38rem;border-radius:2px;font-weight:bold;white-space:nowrap}
.type-badge.KPI{background:#e8f0fd;color:var(--blue)}
.type-badge.Chart{background:#e6f4f2;color:var(--teal)}
.type-badge.Dashboard{background:#f2ecfd;color:var(--purple)}

/* mart name */
.mname{font-family:var(--ff-mono);font-size:.68rem;color:var(--navy)}

/* semantic label */
.semantic{font-size:.72rem;color:#1a2a32}

/* model path */
.mpath{font-family:var(--ff-mono);font-size:.65rem;color:var(--steel);word-break:break-all}

/* title col */
.kpi-title{font-weight:bold;font-size:.78rem;color:#1a2a32}

/* result counter */
.result-info{font-size:.7rem;color:var(--steel);margin-bottom:.5rem;padding-left:.25rem}
</style>

  "mart_enrollment_census":"distribute/marts/enrollment/mart_enrollment_census",
  "mart_enrollment_demographics":"distribute/marts/enrollment/mart_enrollment_demographics",
  "mart_registration_holds":"distribute/marts/registration/mart_registration_holds",
  "mart_section_utilization":"distribute/marts/registration/mart_section_utilization",
  "mart_academic_progress":"distribute/marts/academic/mart_academic_progress",
  "snap_admissions_weekly":"distribute/snapshots/snap_admissions_weekly",
  "snap_cohort_milestone":"distribute/snapshots/snap_cohort_milestone",
  "snap_enrollment_term":"distribute/snapshots/snap_enrollment_term",
  "snap_retention_term":"distribute/snapshots/snap_retention_term",
  "snap_aid_term":"distribute/snapshots/snap_aid_term",
  "mart_aid_leveraging":"distribute/marts/financial_aid/mart_aid_leveraging",
  "mart_aid_summary":"distribute/marts/financial_aid/mart_aid_summary",
  "mart_financial_aid_trend":"distribute/marts/financial_aid/mart_financial_aid_trend",
  "mart_ipeds_reporting":"distribute/marts/benchmarking/mart_ipeds_reporting",
  "mart_ipeds_peer_comparison":"distribute/marts/benchmarking/mart_ipeds_peer_comparison",
  "mart_retention_cohort_summary":"distribute/marts/enrollment/mart_retention_cohort_summary",
  "mart_student_at_risk":"distribute/marts/enrollment/mart_student_at_risk",
  "mart_executive_summary":"distribute/marts/executive/mart_executive_summary",
  "mart_ipeds_fall_enrollment":"distribute/marts/benchmarking/mart_ipeds_fall_enrollment",
  "mart_enrollment_census_ntr":"distribute/marts/enrollment/mart_enrollment_census_ntr",
  "mart_scorecard_program_outcomes":"distribute/marts/benchmarking/mart_scorecard_program_outcomes"
};
const MART_CATEGORY = {
  "mart_admissions_funnel":"Funnel","mart_admissions_class_profile":"Class Profile",
  "mart_enrollment_census":"Headcount","mart_enrollment_demographics":"Demographics",
  "mart_registration_holds":"Registration Operations","mart_section_utilization":"Course Management",
  "mart_academic_progress":"Academic Progress","snap_admissions_weekly":"Funnel Trends",
  "snap_cohort_milestone":"Cohort Analytics","snap_enrollment_term":"Enrollment Trends",
  "snap_retention_term":"Retention Tracking","snap_aid_term":"Aid Trends",
  "mart_aid_leveraging":"Aid Strategy","mart_aid_summary":"Aid Operations",
  "mart_financial_aid_trend":"Aid History","mart_ipeds_reporting":"Federal Reporting",
  "mart_ipeds_peer_comparison":"Peer Benchmarking","mart_retention_cohort_summary":"Retention Analytics",
  "mart_student_at_risk":"Early Alert","mart_executive_summary":"Executive View",
  "mart_ipeds_fall_enrollment":"IPEDS Reporting","mart_enrollment_census_ntr":"Net Revenue",
  "mart_scorecard_program_outcomes":"Program Outcomes"
};
const DOMAIN_MAP = {
  "Admissions":"Admissions","Registration":"Academics","Financial Aid":"Financial Aid",
  "Enrollment Management":"Enrollment","Cross-Domain":"Institutional Research"
};
const AREA_ORDER = ["All","Admissions","Registration","Financial Aid","Enrollment Management","Cross-Domain"];
const TYPE_ORDER = ["All","KPI","Chart","Dashboard"];

let activeArea = "All";
let activeType = "All";
let searchVal  = "";

function computeType(d){
  if(d.type==="Dashboard") return "Dashboard";
  if(CHART_WORDS.some(w=>d.title.includes(w))) return "Chart";
  return "KPI";
}

function semanticLabel(area,title,mart){
  const domain = DOMAIN_MAP[area]||area;
  const cat = MART_CATEGORY[mart]||mart;
  let m = title
    .replace(/ Trend.*$/i,"").replace(/ \(.*?\)/g,"")
    .replace(/ Dashboard$/i,"").replace(/ Builder$/i,"")
    .replace(/ Report$/i,"").replace(/ Overview$/i,"")
    .replace(/ Monitor$/i,"").replace(/ Board$/i,"")
    .replace(/ Tracker$/i,"").replace(/ Model$/i,"")
    .replace(/ Prep$/i,"").replace(/\s+/g," ").trim();
  return domain+" > "+cat+" > "+m;
}

function areaClass(a){ return a.replace(/\s+/g,"-"); }

function buildCounts(){
  const el = document.getElementById("counts");
  const all = DATA.length;
  const types = {KPI:0,Chart:0,Dashboard:0};
  DATA.forEach(d=>{types[computeType(d)]++;});
  [{lbl:"All ("+all+")",cls:""},
   {lbl:"KPI ("+types.KPI+")",cls:"kpi"},
   {lbl:"Chart ("+types.Chart+")",cls:"chart"},
   {lbl:"Dashboard ("+types.Dashboard+")",cls:"dashboard"}
  ].forEach(item=>{
    const p=document.createElement("span");
    p.className="count-pill"+(item.cls?" "+item.cls:"");
    p.textContent=item.lbl;
    el.appendChild(p);
  });
}

function buildFilters(){
  const af=document.getElementById("area-filters");
  AREA_ORDER.forEach(a=>{
    const b=document.createElement("button");
    b.className="fbtn"+(a==="All"?" active":"");
    b.dataset.val=a;
    b.textContent=a==="Enrollment Management"?"Enrollment Mgmt":a;
    b.onclick=()=>{
      activeArea=a;
      af.querySelectorAll(".fbtn").forEach(x=>x.classList.remove("active"));
      b.classList.add("active");
      applyFilters();
    };
    af.appendChild(b);
  });
  const tf=document.getElementById("type-filters");
  TYPE_ORDER.forEach(t=>{
    const b=document.createElement("button");
    b.className="fbtn"+(t==="All"?" active":"");
    b.dataset.val=t;
    b.textContent=t;
    b.onclick=()=>{
      activeType=t;
      tf.querySelectorAll(".fbtn").forEach(x=>x.classList.remove("active"));
      b.classList.add("active");
      applyFilters();
    };
    tf.appendChild(b);
  });
  document.getElementById("search").oninput=function(){
    searchVal=this.value.toLowerCase().trim();
    applyFilters();
  };
}

function buildTable(){
  const tbody=document.getElementById("tbody");
  DATA.forEach(d=>{
    const t=computeType(d);
    const sl=semanticLabel(d.area,d.title,d.mart);
    const mp=MODEL_PATHS[d.mart]||d.mart;
    const ac=areaClass(d.area);
    const tr=document.createElement("tr");
    tr.dataset.area=d.area;
    tr.dataset.type=t;
    tr.dataset.search=(d.title+" "+d.area+" "+d.mart+" "+sl).toLowerCase();
    tr.innerHTML=
      '<td style="color:var(--steel);font-variant-numeric:tabular-nums;white-space:nowrap">'+d.n+'</td>'+
      '<td><span class="area '+ac+'">'+d.area+'</span></td>'+
      '<td><span class="kpi-title">'+d.title+'</span></td>'+
      '<td><span class="type-badge '+t+'">'+t+'</span></td>'+
      '<td><span class="mname">'+d.mart+'</span></td>'+
      '<td><span class="semantic">'+sl+'</span></td>'+
      '<td><span class="mpath">'+mp+'</span></td>';
    tbody.appendChild(tr);
  });
}

function applyFilters(){
  let shown=0;
  document.querySelectorAll("#tbody tr").forEach(tr=>{
    const matchArea=activeArea==="All"||tr.dataset.area===activeArea;
    const matchType=activeType==="All"||tr.dataset.type===activeType;
    const matchSearch=!searchVal||tr.dataset.search.includes(searchVal);
    const vis=matchArea&&matchType&&matchSearch;
    tr.classList.toggle("hidden",!vis);
    if(vis) shown++;
  });
  const info=document.getElementById("result-info");
  const filters=[];
  if(activeArea!=="All") filters.push(activeArea);
  if(activeType!=="All") filters.push(activeType);
  if(searchVal) filters.push('"'+searchVal+'"');
  info.textContent=shown+" of "+DATA.length+" entries"+(filters.length?" · "+filters.join(" · "):"");
}

buildCounts();
buildFilters();
buildTable();
applyFilters();
</script>
