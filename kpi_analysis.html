<title>DEMEAU · KPI Gap Analysis</title>
<style>
:root {
  --navy:#13405a; --maroon:#740049; --green:#5c861d; --blue:#4285f4;
  --amber:#b86e00; --red:#a82020; --teal:#1a7a6e; --steel:#5a6e7a;
  --bg:#f0f4f6; --surface:#fff; --border:#c8d4da;
  --c-complete:#5c861d; --c-mart-ready:#4285f4; --c-alt:#7b50c8;
  --c-blocked:#b86e00; --c-notbuilt:#a82020;
  --ff-ui:Verdana,Geneva,Tahoma,sans-serif;
  --ff-mono:'Courier New',Courier,monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg);font-family:var(--ff-ui);font-size:13px;color:#1a2a32;line-height:1.4}

.page{max-width:1200px;margin:0 auto;padding:2rem 1.25rem 4rem}

/* header */
.hdr{border-bottom:3px solid var(--navy);padding-bottom:1rem;margin-bottom:1.5rem}
.hdr .eye{font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--steel);margin-bottom:.3rem}
.hdr h1{font-family:Georgia,serif;font-size:1.6rem;font-weight:normal;color:var(--navy);line-height:1.2}
.hdr .sub{font-size:.72rem;color:var(--steel);margin-top:.3rem}
.hdr .dash-link{display:inline-flex;align-items:center;gap:.35rem;margin-top:.75rem;padding:.4rem .75rem;background:var(--maroon);color:#fff;text-decoration:none;border-radius:3px;font-size:.75rem;font-weight:bold;letter-spacing:.02em;transition:all .2s}
.hdr .dash-link:hover{background:#8b0057;transform:translateY(-1px);box-shadow:0 2px 6px rgba(116,0,73,.25)}
.hdr .dash-link svg{width:14px;height:14px;fill:currentColor}
.counts{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:1rem}
.count-pill{display:inline-flex;align-items:center;gap:.4rem;padding:.25rem .65rem;border-radius:2px;font-size:.7rem;font-weight:bold;cursor:pointer;border:2px solid transparent;transition:opacity .15s}
.count-pill:hover{opacity:.8}
.count-pill.active{border-color:currentColor}
.count-pill[data-filter="all"]{background:#e0e8ed;color:var(--navy)}
.count-pill[data-filter="complete"]{background:#edf5e0;color:var(--c-complete)}
.count-pill[data-filter="mart-ready"]{background:#e8f0fd;color:var(--c-mart-ready)}
.count-pill[data-filter="alt-source"]{background:#f2ecfd;color:var(--c-alt)}
.count-pill[data-filter="data-blocked"]{background:#fdf4e3;color:var(--c-blocked)}
.count-pill[data-filter="not-built"]{background:#fdeaea;color:var(--c-notbuilt)}

/* filter bar */
.filterbar{display:flex;flex-wrap:wrap;gap:.75rem;align-items:center;margin-bottom:1rem;padding:.6rem .75rem;background:var(--surface);border:1px solid var(--border)}
.filter-label{font-size:.68rem;text-transform:uppercase;letter-spacing:.08em;color:var(--steel);white-space:nowrap}
.filter-group{display:flex;flex-wrap:wrap;gap:.3rem}
.fbtn{padding:.2rem .55rem;font-size:.68rem;font-family:var(--ff-ui);border:1px solid var(--border);background:var(--bg);color:var(--steel);cursor:pointer;border-radius:2px;font-weight:bold;letter-spacing:.03em}
.fbtn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.divider{width:1px;background:var(--border);align-self:stretch}

/* table */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;background:var(--surface);font-size:.75rem}
thead th{background:var(--navy);color:#fff;padding:.5rem .6rem;text-align:left;font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;white-space:nowrap;position:sticky;top:0;z-index:2}
thead th:first-child{width:28px}
tbody tr{border-bottom:1px solid var(--border)}
tbody tr:nth-child(even){background:#f7fafb}
tbody tr:hover{background:#eef5f8}
tbody tr.hidden{display:none}
td{padding:.45rem .6rem;vertical-align:top;line-height:1.35}
td:first-child{width:6px;padding:0;border-right:none}

/* status stripe */
.stripe{width:6px;min-height:100%;display:block}
.stripe.complete  {background:var(--c-complete)}
.stripe.mart-ready{background:var(--c-mart-ready)}
.stripe.alt-source{background:var(--c-alt)}
.stripe.data-blocked{background:var(--c-blocked)}
.stripe.not-built {background:var(--c-notbuilt)}

/* status chip */
.chip{display:inline-block;font-size:.63rem;padding:.12rem .38rem;border-radius:2px;font-weight:bold;white-space:nowrap;vertical-align:middle}
.chip.complete  {background:#edf5e0;color:var(--c-complete)}
.chip.mart-ready{background:#e8f0fd;color:var(--c-mart-ready)}
.chip.alt-source{background:#f2ecfd;color:var(--c-alt)}
.chip.data-blocked{background:#fdf4e3;color:var(--c-blocked)}
.chip.not-built {background:#fdeaea;color:var(--c-notbuilt)}

/* area badge */
.area{display:inline-block;font-size:.62rem;padding:.1rem .35rem;border-radius:2px;font-weight:bold;letter-spacing:.03em;white-space:nowrap}
.area.Admissions{background:#fdf0f6;color:var(--maroon);border:1px solid #d999bb}
.area.Registration{background:#edf4e5;color:var(--green);border:1px solid #a8c57a}
.area.Financial-Aid{background:#fffbe8;color:#8a6a00;border:1px solid #d4c060}
.area.Enrollment-Management{background:#e8f0f5;color:var(--navy);border:1px solid #9ab9cd}
.area.Cross-Domain{background:#f3f0fb;color:#5a3d9e;border:1px solid #c0aee8}

/* type badge */
.type-kpi{font-size:.62rem;color:var(--steel)}
.type-dash{font-size:.62rem;color:#9b7500;font-style:italic}

/* mart name */
.mname{font-family:var(--ff-mono);font-size:.7rem;color:var(--navy)}
.mname.empty{color:var(--c-blocked)}
.mname.not-built-m{color:#aaa}
.mart-rows{font-size:.65rem;color:var(--steel);margin-top:.15rem}

/* dashboard col */
.dash-loc{font-size:.72rem;color:#1a2a32}
.dash-loc em{color:var(--c-alt);font-style:normal;font-size:.67rem}
.no-dash{color:#bbb;font-size:.7rem}

/* title col */
.kpi-title{font-weight:bold;font-size:.78rem;color:#1a2a32}

/* result counter */
.result-info{font-size:.7rem;color:var(--steel);margin-bottom:.5rem;padding-left:.25rem}

/* tooltip */
#tt{position:fixed;z-index:300;display:none;max-width:420px;min-width:200px;
  background:#fff;border:1px solid var(--navy);border-top:3px solid var(--navy);
  box-shadow:0 6px 24px rgba(19,64,90,.18);border-radius:0 0 3px 3px;
  padding:.8rem .95rem .75rem;font-size:.72rem;line-height:1.5;pointer-events:none}
#tt .tt-hd{font-weight:bold;font-size:.77rem;color:var(--navy);margin-bottom:.35rem;line-height:1.3}
#tt .tt-desc{color:#1a2a32;margin-bottom:.55rem;font-size:.73rem}
#tt .tt-lbl{font-size:.6rem;text-transform:uppercase;letter-spacing:.08em;color:var(--steel);font-weight:bold;margin-bottom:.12rem}
#tt .tt-calc{font-size:.67rem;color:#2c3e4a;font-family:var(--ff-mono);line-height:1.45;max-height:110px;overflow-y:auto;padding-right:.2rem}
#tt .tt-cav{margin-top:.45rem;font-size:.66rem;color:var(--amber);background:#fdf4e3;padding:.3rem .45rem;border-left:3px solid var(--amber);line-height:1.4}
.kpi-title{cursor:help;border-bottom:1px dotted transparent;transition:border-color .1s}
.kpi-title:hover{border-bottom-color:var(--steel)}
</style>

const STATUS_LABELS = {
  "complete":    "On Dashboard",
  "alt-source":  "Alt Source",
  "mart-ready":  "Mart Ready",
  "data-blocked":"Data Blocked",
  "not-built":   "Not Built",
};
const STATUS_ORDER = ["all","complete","alt-source","mart-ready","data-blocked","not-built"];
const AREA_ORDER = ["All","Admissions","Registration","Financial Aid","Enrollment Management","Cross-Domain"];

let activeStatus = "all";
let activeArea   = "All";
let activeType   = "All";

function areaClass(a){ return a.replace(/\s+/g,"-"); }

function buildCounts(){
  const el = document.getElementById("counts");
  const totals = {all:DATA.length};
  STATUS_ORDER.slice(1).forEach(s=>{ totals[s]=DATA.filter(d=>d.status===s).length; });
  STATUS_ORDER.forEach(s=>{
    const lbl = s==="all"?"All (127)":STATUS_LABELS[s]+" ("+totals[s]+")";
    const pill = document.createElement("span");
    pill.className="count-pill"+(s==="all"?" active":"");
    pill.dataset.filter=s;
    pill.textContent=lbl;
    pill.onclick=()=>{ activeStatus=s; applyFilters(); updateActiveCount(pill); };
    el.appendChild(pill);
  });
}

function updateActiveCount(clicked){
  document.querySelectorAll(".count-pill").forEach(p=>p.classList.remove("active"));
  clicked.classList.add("active");
}

function buildFilters(){
  // status buttons
  const sf = document.getElementById("status-filters");
  STATUS_ORDER.forEach(s=>{
    const lbl = s==="all"?"All":STATUS_LABELS[s]||"All";
    const b=document.createElement("button");
    b.className="fbtn"+(s==="all"?" active":"");
    b.dataset.val=s; b.textContent=lbl;
    b.onclick=()=>{
      activeStatus=s;
      sf.querySelectorAll(".fbtn").forEach(x=>x.classList.remove("active"));
      b.classList.add("active");
      // sync count pills
      document.querySelectorAll(".count-pill").forEach(p=>{
        p.classList.toggle("active", p.dataset.filter===s);
      });
      applyFilters();
    };
    sf.appendChild(b);
  });

  // area buttons
  const af = document.getElementById("area-filters");
  AREA_ORDER.forEach(a=>{
    const b=document.createElement("button");
    b.className="fbtn"+(a==="All"?" active":"");
    b.dataset.val=a; b.textContent=a==="Enrollment Management"?"Enrollment Mgmt":a;
    b.onclick=()=>{
      activeArea=a;
      af.querySelectorAll(".fbtn").forEach(x=>x.classList.remove("active"));
      b.classList.add("active");
      applyFilters();
    };
    af.appendChild(b);
  });

  // type buttons
  const tf = document.getElementById("type-filters");
  ["All","KPI","Dashboard"].forEach(t=>{
    const b=document.createElement("button");
    b.className="fbtn"+(t==="All"?" active":"");
    b.dataset.val=t; b.textContent=t;
    b.onclick=()=>{
      activeType=t;
      tf.querySelectorAll(".fbtn").forEach(x=>x.classList.remove("active"));
      b.classList.add("active");
      applyFilters();
    };
    tf.appendChild(b);
  });
}

function buildTable(){
  const tbody = document.getElementById("tbody");
  DATA.forEach(d=>{
    const ms = martStatus(d.mart);
    const tr = document.createElement("tr");
    tr.dataset.status = d.status;
    tr.dataset.area   = d.area;
    tr.dataset.type   = d.type;

    const msLabel = ms==="built"
      ? '<span style="color:var(--c-complete);font-weight:bold">● Built</span>'
      : ms==="empty"
      ? '<span style="color:var(--c-blocked);font-weight:bold">⚠ Built — 0 rows</span>'
      : '<span style="color:var(--c-notbuilt)">○ Not in DISTRIBUTE</span>';

    const rowsStr = fmtRows(d.mart);
    const dashHtml = d.dashboard
      ? (d.status==="alt-source"
          ? '<span class="dash-loc"><em>⚠ Alt source: </em>'+d.dashboard+'</span>'
          : '<span class="dash-loc">'+d.dashboard+'</span>')
      : '<span class="no-dash">—</span>';

    const ac = areaClass(d.area);

    tr.innerHTML =
      '<td><span class="stripe '+d.status+'"></span></td>'+
      '<td style="color:var(--steel);font-variant-numeric:tabular-nums">'+d.n+'</td>'+
      '<td><span class="area '+ac+'">'+d.area+'</span></td>'+
      '<td><span class="kpi-title" data-kpi="'+d.title.replace(/"/g,"&quot;")+'">'+d.title+'</span></td>'+
      '<td>'+(d.type==="KPI"?'<span class="type-kpi">KPI</span>':'<span class="type-dash">Dashboard</span>')+'</td>'+
      '<td><span class="mname'+(ms==="not-built"?" not-built-m":ms==="empty"?" empty":"")+'">'+d.mart+'</span>'+
           '<div class="mart-rows">'+rowsStr+'</div></td>'+
      '<td>'+msLabel+'</td>'+
      '<td>'+dashHtml+'</td>'+
      '<td><span class="chip '+d.status+'">'+STATUS_LABELS[d.status]+'</span></td>';
    tbody.appendChild(tr);
  });
}

function applyFilters(){
  let shown=0;
  document.querySelectorAll("#tbody tr").forEach(tr=>{
    const matchStatus = activeStatus==="all" || tr.dataset.status===activeStatus;
    const matchArea   = activeArea==="All"   || tr.dataset.area===activeArea;
    const matchType   = activeType==="All"   || tr.dataset.type===activeType;
    const vis = matchStatus && matchArea && matchType;
    tr.classList.toggle("hidden",!vis);
    if(vis) shown++;
  });
  const info = document.getElementById("result-info");
  const filters=[];
  if(activeStatus!=="all") filters.push(STATUS_LABELS[activeStatus]);
  if(activeArea!=="All")   filters.push(activeArea);
  if(activeType!=="All")   filters.push(activeType);
  info.textContent = shown+" of 127 entries"+(filters.length?" · "+filters.join(" · "):"");
}

const KPI_DETAILS = [
/* n:1 */  {d:`% of inquiries that submit a complete application. Benchmark: 15–30%.`,c:`Numerator: distinct applicants with funnel_stage_canonical in (applied, complete, admitted, deposited, enrolled, denied, withdrawn_app); denominator: all applicants including inquiry stage. COALESCE to 0 on zero denominator. Column: inquiry_to_app_rate.`,v:`COALESCE to 0 masks a zero-inquiry denominator; numerator counts denied/withdrawn_app applicants as 'applied.'`},
/* n:2 */  {d:`Overall selectivity. Tracks admit rate by program, demographic, and geographic cohort.`,c:`Numerator: distinct applicants in (admitted, deposited, enrolled); denominator: in (complete, admitted, deposited, enrolled, denied). Column: admit_rate.`,v:`Denominator excludes inquiry and applied stages — only complete-or-further applications count toward the base.`},
/* n:3 */  {d:`% of admitted students who enroll. Key driver of net tuition revenue planning.`,c:`Numerator: distinct applicants in (deposited, enrolled); denominator: in (admitted, deposited, enrolled). Column: yield_rate.`,v:`Yield numerator includes deposited students who have not yet formally enrolled.`},
/* n:4 */  {d:`Deposits received vs. goal by term. Daily tracking critical in spring recruiting season.`,c:`Count of distinct applicants with funnel_stage_canonical in (deposited, enrolled) per program × entry term. Column: deposit_count.`,v:`No goal/budget denominator in mart — vs-goal comparison requires external input.`},
/* n:5 */  {d:`% who applied with no prior inquiry. Indicates digital/brand reach vs. direct recruitment.`,c:`Numerator: distinct applicants with stealth_flag=true; denominator: all applicants beyond inquiry stage. COALESCE to 0. Column: stealth_app_pct.`,v:`stealth_flag definition depends on upstream CRM inquiry-linkage logic in fact_application.`},
/* n:6 */  {d:`% of started applications that are fully submitted. Low rates flag UX or process issues.`,c:`app_complete_count divided by app_started_count; no pre-computed rate column in mart — BI layer must divide app_complete_count / app_started_count.`,v:`Completion rate not pre-computed — BI layer must derive it.`},
/* n:7 */  {d:`Mean/median GPA and test scores of admitted and enrolled cohorts, tracked year-over-year.`,c:`avg_hs_gpa: mean hs_gpa for enrolled applicants (enrolled_flag=true). avg_sat_total / avg_act_composite: means where test_optional_flag=false. Columns: avg_hs_gpa, avg_sat_total, avg_act_composite.`,v:`test_optional_flag is hardcoded false on dim_applicant — all enrolled applicants are included in test score averages regardless of test-optional status.`},
/* n:8 */  {d:`% of enrollees from out-of-state, international, or target feeder markets.`,c:`geographic_diversity_index = 1 − SUM[(tier_count / total_enrolled)²] across three geo tiers: in_state, out_of_state, international. Range 0–0.67. Column: geographic_diversity_index.`,v:`in_state defined as state_code matching var('institution_state', 'MA') — must set institution_state var per school at runtime.`},

/* n:11 */ {d:`Contacts per counselor, visit volume, and event attendance vs. targets.`,c:`Count of distinct counselor_ref values for applicants with enrolled_flag=true per program × term. Column: active_counselor_count.`,v:`Counts only counselors with at least one enrolled student; visit volume and event attendance metrics are not in this mart.`},
/* n:12 */ {d:`Total recruitment budget ÷ new enrolled headcount. Compare by channel and cohort.`,c:`Total recruitment budget (from GL — not in mart) divided by enrolled_count. Mart provides enrolled_count denominator only; numerator requires external GL cost source.`,v:`Budget/cost numerator not in mart; full KPI requires GL integration.`},
/* n:13 */ {d:`Avg. days from complete application to decision letter. Affects competitor yield.`,c:`avg_days_app_to_complete: mean days from start to complete status. avg_days_complete_to_decision: mean days from complete to admission decision. avg_days_inquiry_to_decision: total inquiry-to-decision mean.`,v:``},

/* n:15 */ {d:`Each funnel stage compared to same week/month of prior cycle. Reveals if class is building faster or slower.`,c:`Time-series view of admissions funnel metrics per program × entry term × snapshot_week_num (weeks since Oct 1 of entry-year cycle start).`,v:`Prior-year comparison requires BI-layer self-join on matching snapshot_week_num across different entry terms.`},

const KPI_META = {};
DATA.forEach((d,i) => { if(KPI_DETAILS[i]) KPI_META[d.title] = KPI_DETAILS[i]; });

function showTT(e, title) {
  const m = KPI_META[title];
  if(!m) return;
  const tt = document.getElementById("tt");
  tt.innerHTML = '<div class="tt-hd">'+title+'</div>'+
    '<div class="tt-desc">'+m.d+'</div>'+
    '<div class="tt-lbl">Calculation</div>'+
    '<div class="tt-calc">'+m.c+'</div>'+
    (m.v ? '<div class="tt-cav">&#9888; '+m.v+'</div>' : '');
  tt.style.display = 'block';
  moveTT(e);
}

function moveTT(e) {
  const tt = document.getElementById("tt");
  if(tt.style.display === 'none') return;
  const pad = 12, w = tt.offsetWidth || 420, h = tt.offsetHeight || 200;
  let x = e.clientX + 16, y = e.clientY + 10;
  if(x + w > window.innerWidth - pad) x = e.clientX - w - 10;
  if(y + h > window.innerHeight - pad) y = e.clientY - h - 10;
  tt.style.left = Math.max(pad, x) + 'px';
  tt.style.top  = Math.max(pad, y) + 'px';
}

function hideTT() { document.getElementById("tt").style.display = 'none'; }

document.getElementById("tbody").addEventListener('mouseover', function(e) {
  const sp = e.target.closest('.kpi-title');
  if(sp) showTT(e, sp.dataset.kpi || sp.textContent);
});
document.getElementById("tbody").addEventListener('mousemove', moveTT);
document.getElementById("tbody").addEventListener('mouseleave', hideTT);

buildCounts();
buildFilters();
buildTable();
applyFilters();
</script>
